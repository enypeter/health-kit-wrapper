name: health_kit_wrapper_example
description: "Demonstrates the health_kit_wrapper plugin: dashboard, analytics, and live observers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5

  # The plugin under development, consumed via a path dependency.
  health_kit_wrapper:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
