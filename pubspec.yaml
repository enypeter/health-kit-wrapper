name: health_kit_wrapper
description: >-
  Unified health data plugin for iOS (HealthKit) and Android (Health Connect).
  One Dart API for permissions, aggregate/sample reads across 26 data types,
  and live change observation — backed by deep native implementations.
version: 1.0.0
homepage: https://github.com/enypeter/health-kit-wrapper
repository: https://github.com/enypeter/health-kit-wrapper
issue_tracker: https://github.com/enypeter/health-kit-wrapper/issues
topics:
  - health
  - healthkit
  - health-connect
  - fitness
  - wellness

environment:
  sdk: ^3.11.1
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.healthconnectreporter
        pluginClass: HealthConnectReporterPlugin
      ios:
        pluginClass: HealthKitWrapperPlugin
